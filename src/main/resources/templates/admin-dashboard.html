<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - Mani Arts</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        .container {
            max-width: 420px;
            background: white;
            margin: 80px auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
            text-align: center;
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            color: #555;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .action {
            display: block;
            margin-top: 15px;
            padding: 14px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            color: white;
            background: #25D366;
        }

        .action:hover {
            background: #1ebe5d;
        }

        .secondary {
            background: #111;
        }

        .secondary:hover {
            background: #333;
        }

        /* 🆕 ORDERS BUTTON */
        .orders {
            background: #007bff;
        }

        .orders:hover {
            background: #0056b3;
        }

        .logout {
            background: #ff4d4d;
        }

        .logout:hover {
            background: #e63939;
        }

        .home {
            display: block;
            margin-top: 18px;
            text-decoration: none;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🎨 Mani Arts</h2>
    <p>Admin Control Panel</p>

    <a class="action" href="/admin/add-frame">➕ Add New Frame</a>

<a class="action secondary" href="/frames">👀 View Frames</a>
   
    <!-- ✅ NEW BUTTON -->
    <a class="action orders" href="/admin/orders">📦 View Orders</a>

    <a class="action logout" href="/logout">🚪 Logout</a>

    <a href="/" class="home">🏠 Back to Home</a>

</div>

</body>
</html>
