<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | Mani Arts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 380px;
            background: white;
            margin: 40px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 14px;
            background: #25D366;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .links {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
        }

        .links a {
            color: #25D366;
            font-weight: bold;
            text-decoration: none;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }

        .success {
            color: green;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🔐 Login</h2>

    <!-- ERROR -->
    <div th:if="${param.error}" class="error">
        Invalid email or password ❌
    </div>

    <!-- REGISTER SUCCESS -->
    <div th:if="${param.registered}" class="success">
        Account created successfully ✅ Please login
    </div>

    <form method="post" action="/login">
        <label>Email</label>
        <input type="text" name="username" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>
    </form>

    <div class="links">
        New user?
        <a href="/register">Create Account</a>
        <br><br>
        <a href="/">🏠 Back to Home</a>
    </div>

</div>

</body>
</html>
